suites:
  planner-smoke:
    description: Fixture-backed smoke cases for validating that the model picks the expected SkyFi tools.
    stage: smoke
    mode: fixture
    fixture_set: planner-smoke
    cases:
      - archive-search-place-name
      - prepare-archive-order-with-confirmation-gate
      - ambiguous-order-needs-clarification
      - archive-order-missing-aoi
      - order-confirm-without-preparation
  live-smoke:
    description: Read-only live cases against a running SkyFi MCP server to verify useful outputs.
    stage: smoke
    mode: live
    cases:
      - live-location-and-search
      - live-pricing-exploration
      - live-account-readiness
  live-integration-smoke:
    description: Minimal live integration checks against the real SkyFi-backed MCP server.
    stage: smoke
    mode: live
    cases:
      - live-account-readiness
      - live-pricing-exploration
      - live-location-and-search
      - live-address-lookup
  live-feasibility-smoke:
    description: Minimal live feasibility check against the real SkyFi-backed MCP server.
    stage: smoke
    mode: live
    cases:
      - live-feasibility-check
  live-opportunity-smoke:
    description: Minimal live pass-prediction check against the real SkyFi-backed MCP server.
    stage: smoke
    mode: live
    cases:
      - live-address-next-opportunity-too-soon
      - live-address-next-opportunity
  live-orders-smoke:
    description: Minimal read-only order history checks against the real SkyFi-backed MCP server.
    stage: smoke
    mode: live
    cases:
      - live-orders-list
      - live-order-detail
  live-monitoring-smoke:
    description: Minimal read-only AOI monitoring checks against the real SkyFi-backed MCP server.
    stage: smoke
    mode: live
    cases:
      - live-monitoring-review
