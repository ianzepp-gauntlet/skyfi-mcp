suites:
  planner-smoke:
    description: Fixture-backed smoke cases for validating that the model picks the expected SkyFi tools.
    stage: smoke
    mode: fixture
    fixture_set: planner-smoke
    cases:
      - archive-search-place-name
      - prepare-archive-order-with-confirmation-gate
      - ambiguous-order-needs-clarification
      - archive-order-missing-aoi
      - order-confirm-without-preparation
  planner-human-loop-smoke:
    description: Fixture-backed multi-turn confirmation-gate cases for validating explicit human approval before order confirmation.
    stage: smoke
    mode: fixture
    fixture_set: planner-smoke
    cases:
      - human-approval-confirms-order
      - no-approval-no-confirm
  planner-multistep-smoke:
    description: Fixture-backed multi-step workflow cases for search, clarification, and tasking exploration.
    stage: smoke
    mode: fixture
    fixture_set: planner-smoke
    cases:
      - search-then-archive-detail
      - clarify-then-prepare-archive-order
      - feasibility-then-pass-prediction
  planner-aoi-smoke:
    description: Fixture-backed AOI monitoring workflows covering create, review, alerts, delete, and underspecified requests.
    stage: smoke
    mode: fixture
    fixture_set: planner-smoke
    cases:
      - aoi-create-list-delete
      - aoi-create-get-alerts-delete
      - aoi-create-missing-webhook
  live-smoke:
    description: Read-only live cases against a running SkyFi MCP server to verify useful outputs.
    stage: smoke
    mode: live
    cases:
      - live-location-and-search
      - live-pricing-exploration
      - live-account-readiness
  live-integration-smoke:
    description: Minimal live integration checks against the real SkyFi-backed MCP server.
    stage: smoke
    mode: live
    cases:
      - live-account-readiness
      - live-pricing-exploration
      - live-location-and-search
      - live-address-lookup
  live-feasibility-smoke:
    description: Minimal live feasibility check against the real SkyFi-backed MCP server.
    stage: smoke
    mode: live
    cases:
      - live-feasibility-check
  live-opportunity-smoke:
    description: Minimal live pass-prediction check against the real SkyFi-backed MCP server.
    stage: smoke
    mode: live
    cases:
      - live-address-next-opportunity-too-soon
      - live-address-next-opportunity
  live-orders-smoke:
    description: Minimal read-only order history checks against the real SkyFi-backed MCP server.
    stage: smoke
    mode: live
    cases:
      - live-orders-list
      - live-order-detail
  live-monitoring-smoke:
    description: Minimal read-only AOI monitoring checks against the real SkyFi-backed MCP server.
    stage: smoke
    mode: live
    cases:
      - live-monitoring-review
  live-aoi-smoke:
    description: Live AOI monitoring lifecycle and webhook visibility checks.
    stage: smoke
    mode: live
    cases:
      - live-aoi-create-list-delete
      - live-aoi-create-get-delete
      - live-webhook-alerts-list
  live-budget-smoke:
    description: Minimal pricing and budget-filtered discovery checks against the real SkyFi-backed MCP server.
    stage: smoke
    mode: live
    cases:
      - live-product-pricing-catalog
      - live-archive-under-budget
  live-ordering-smoke:
    description: Minimal mutation-safe ordering checks that exercise orders_prepare but forbid order confirmation.
    stage: smoke
    mode: live
    cases:
      - live-prepare-archive-order
      - live-order-missing-details
  live-multistep-smoke:
    description: Safe live multi-step conversational flows that chain read-only tools and prepare-only ordering.
    stage: smoke
    mode: live
    cases:
      - live-search-then-archive-detail-ambiguous
      - live-search-then-archive-detail
      - live-search-then-prepare-no-confirm
  live-tasking-smoke:
    description: Safe live tasking workflows that resolve an address, check feasibility, and prepare but do not confirm tasking orders.
    stage: smoke
    mode: live
    cases:
      - live-address-feasibility-no-opportunities
      - live-address-feasibility-then-prepare-tasking
      - live-address-pass-then-prepare-tasking
      - live-tasking-missing-constraints
