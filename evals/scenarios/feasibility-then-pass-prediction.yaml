id: feasibility-then-pass-prediction
description: Check tasking feasibility first, then ask for the next available pass in a follow-up turn.
query: Check whether a DAY HIGH capture is feasible over AOI POLYGON ((-97.75 30.25, -97.73 30.25, -97.73 30.28, -97.75 30.28, -97.75 30.25)) between 2026-03-17T00:00:00Z and 2026-03-24T00:00:00Z.
