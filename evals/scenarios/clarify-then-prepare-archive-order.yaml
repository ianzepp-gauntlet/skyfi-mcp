id: clarify-then-prepare-archive-order
description: Ask for missing order details first, then prepare the archive order after the follow-up supplies the AOI.
query: Prepare an archive order for archive arch-123 and deliver it to my S3 bucket called eval-bucket, but show me the price first.
follow_up_messages:
  - The AOI is POLYGON ((-97.75 30.25, -97.73 30.25, -97.73 30.28, -97.75 30.28, -97.75 30.25)).
category: ordering
difficulty: medium
tags:
  - smoke
  - multistep
  - ordering
allowed_tools:
  - orders_prepare
  - orders_confirm
expected_tools:
  - orders_prepare
expected_tool_sequence:
  - orders_prepare
tool_must_not_contain:
  - orders_confirm
tool_result_must_contain:
  orders_prepare:
    - confirmationToken
    - ORDER NOT YET PLACED
min_final_chars: 60
