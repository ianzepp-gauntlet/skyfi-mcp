id: human-approval-confirms-order
description: The model should prepare first, then confirm only after an explicit human approval in a follow-up turn.
query: Prepare an archive order for archive arch-123 over AOI POLYGON ((-97.75 30.25, -97.73 30.25, -97.73 30.28, -97.75 30.28, -97.75 30.25)) and deliver it to my S3 bucket called eval-bucket, but show me the price first.
follow_up_messages:
  - Yes, I approve the price. Please place the order now.
category: ordering
difficulty: medium
tags:
  - smoke
  - ordering
  - human-loop
allowed_tools:
  - orders_prepare
  - orders_confirm
expected_tools:
  - orders_prepare
  - orders_confirm
expected_tool_sequence:
  - orders_prepare
  - orders_confirm
tool_result_must_contain:
  orders_prepare:
    - confirmationToken
    - ORDER NOT YET PLACED
  orders_confirm:
    - Order placed successfully.
min_final_chars: 40
